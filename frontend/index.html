<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📝 Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 { font-size: 1.8rem; margin-bottom: 24px; color: #1a1a2e; }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus { border-color: #4f46e5; }

    button.add-btn {
      padding: 10px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover { background: #3730a3; }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      gap: 12px;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .todo-title {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
    }

    .todo-title.done {
      text-decoration: line-through;
      color: #aaa;
    }

    .del-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .del-btn:hover { background: #fdecea; }

    .empty {
      text-align: center;
      color: #aaa;
      padding: 20px 0;
    }

    .error {
      color: #e74c3c;
      background: #fdecea;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App - v3</h1>
    <div id="error-box" class="error" style="display:none;"></div>
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="Add a new todo..." />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>

    <div id="todo-list"></div>
  </div>

  <script>
    // API_URL is replaced at runtime by the nginx proxy
    // /api calls are forwarded to backend-service:5000 by nginx
    const API = '/api/todos';

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
      setTimeout(() => box.style.display = 'none', 3000);
    }

    async function fetchTodos() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error('Failed to fetch');
        const todos = await res.json();
        renderTodos(todos);
      } catch (e) {
        showError('Could not load todos. Is the backend running?');
      }
    }

    function renderTodos(todos) {
      const list = document.getElementById('todo-list');
      if (todos.length === 0) {
        list.innerHTML = '<p class="empty">No todos yet. Add one above!</p>';
        return;
      }
      list.innerHTML = todos.map(todo => `
        <div class="todo-item">
          <input
            type="checkbox"
            ${todo.completed ? 'checked' : ''}
            onchange="toggleTodo('${todo._id}')"
          />
          <span class="todo-title ${todo.completed ? 'done' : ''}">
            ${escapeHtml(todo.title)}
          </span>
          <button class="del-btn" onclick="deleteTodo('${todo._id}')">🗑</button>
        </div>
      `).join('');
    }

    async function addTodo() {
      const input = document.getElementById('todo-input');
      const title = input.value.trim();
      if (!title) return;
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        if (!res.ok) throw new Error('Failed to add');
        input.value = '';
        fetchTodos();
      } catch (e) {
        showError('Could not add todo.');
      }
    }

    async function toggleTodo(id) {
      try {
        const res = await fetch(`${API}/${id}`, { method: 'PUT' });
        if (!res.ok) throw new Error('Failed to update');
        fetchTodos();
      } catch (e) {
        showError('Could not update todo.');
      }
    }

    async function deleteTodo(id) {
      try {
        const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed to delete');
        fetchTodos();
      } catch (e) {
        showError('Could not delete todo.');
      }
    }

    // Prevent XSS — always escape user input before rendering as HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }

    // Add todo on Enter key press
    document.getElementById('todo-input')
      .addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTodo();
      });

    // Load todos on page load
    fetchTodos();
  </script>
</body>
</html>



<!-- Browser (Frontend JS)
        ↓
fetch('/api/todos')
        ↓
Nginx (proxy)
        ↓
Backend (index.js)
        ↓
Routes (todos.js)
        ↓
MongoDB
        ↓
Response back same path -->
