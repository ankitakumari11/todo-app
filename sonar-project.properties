# Unique key for this project in SonarQube dashboard
sonar.projectKey=todo-app
sonar.projectName=Todo App
sonar.projectVersion=1.0

# Tell SonarQube where the source code is
sonar.sources=backend/src

# Tell SonarQube where tests are
sonar.tests=backend/tests

# Coverage report generated by jest --coverage
# SonarQube reads this to show code coverage %
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Ignore these folders (no need to scan dependencies or build output)
sonar.exclusions=**/node_modules/**,**/coverage/**


# 1. You run tests (Jest)
# 2. Jest generates coverage report using "test": "jest --coverage --forceExit --detectOpenHandles" inside package.json when we run npm test.: 👉 lcov.info = which lines ran during tests
# 3. SonarQube scans code
# 4. SonarQube reads coverage report
# 5. Shows dashboard (quality + coverage)
# 👉 Jest runs tests → SonarQube reads results